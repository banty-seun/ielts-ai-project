services:
  db:
    image: postgres:16
    container_name: ielts_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ielts_ai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
  adminer:
    image: adminer:latest
    container_name: ielts_ai_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  pg_data:
