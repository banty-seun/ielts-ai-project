name: listening-schema-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  listening-schema-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Ensure pre-deploy DB secret exists
        env:
          PREDEPLOY_DATABASE_URL: ${{ secrets.PREDEPLOY_DATABASE_URL }}
        run: |
          if [ -z "${PREDEPLOY_DATABASE_URL:-}" ]; then
            echo "PREDEPLOY_DATABASE_URL secret is required for listening schema gate."
            exit 1
          fi

      - name: Run listening schema gate against pre-deploy DB
        env:
          DATABASE_URL: ${{ secrets.PREDEPLOY_DATABASE_URL }}
        run: npm run guard:listening-schema
